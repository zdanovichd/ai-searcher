<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Новый пароль — AI Searcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/cabinet.css?v=4" />
  </head>
  <body class="app-page app-page--auth">
    <div class="noise" aria-hidden="true"></div>
    <main class="app-shell">
      <div class="app-brand">
        <p class="app-brand-title">AI Searcher</p>
        <p class="app-brand-subtitle">Задайте новый пароль</p>
      </div>
      <section class="app-card">
        <h2>Новый пароль</h2>
        <form id="form" class="stack auth-form">
          <div>
            <label for="password">Новый пароль</label>
            <input id="password" type="password" autocomplete="new-password" required />
          </div>
          <button type="submit" class="btn">Сохранить пароль</button>
        </form>
        <p id="status" class="status"></p>
        <p class="muted"><a href="/login">Перейти ко входу</a></p>
      </section>
    </main>
    <script type="module">
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token") || "";
      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const status = document.getElementById("status");
        const res = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password: document.getElementById("password").value }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          status.textContent = data.error || "Не удалось сменить пароль.";
          status.classList.add("error");
          return;
        }
        status.textContent = "Пароль обновлён. Теперь можно войти.";
        status.classList.add("ok");
      });
    </script>
  </body>
</html>
