<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Вход — AI Searcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/cabinet.css?v=4" />
  </head>
  <body class="app-page app-page--auth">
    <div class="noise" aria-hidden="true"></div>
    <main class="app-shell">
      <div class="app-brand">
        <p class="app-brand-title">AI Searcher</p>
        <p class="app-brand-subtitle">Сравнение ответов моделей и извлечение ссылок</p>
      </div>
      <section class="app-card">
        <h2>Вход в аккаунт</h2>
        <p class="app-lead">Используйте email и пароль, указанные при регистрации.</p>
        <form id="form" class="stack auth-form">
          <div>
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="username" required />
          </div>
          <div>
            <label for="password">Пароль</label>
            <input id="password" type="password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn">Войти</button>
        </form>
        <p id="status" class="status"></p>
        <p class="muted auth-links"><a href="/register">Создать аккаунт</a> · <a href="/forgot-password">Забыли пароль?</a> · <a href="/legal/">Сведения для покупателей</a></p>
      </section>
    </main>
    <script type="module">
      import { setAccessToken } from "/shared/session.js";
      const form = document.getElementById("form");
      const status = document.getElementById("status");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        status.textContent = "";
        status.classList.remove("error");
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          status.textContent = data.error || "Не удалось войти. Проверьте email и пароль.";
          status.classList.add("error");
          return;
        }
        setAccessToken(data.accessToken);
        window.location.href = "/cabinet/";
      });
    </script>
  </body>
</html>
