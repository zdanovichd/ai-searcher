<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Восстановление пароля — AI Searcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/cabinet.css?v=4" />
  </head>
  <body class="app-page app-page--auth">
    <div class="noise" aria-hidden="true"></div>
    <main class="app-shell">
      <div class="app-brand">
        <p class="app-brand-title">AI Searcher</p>
        <p class="app-brand-subtitle">Восстановление доступа</p>
      </div>
      <section class="app-card">
        <h2>Восстановление пароля</h2>
        <p class="app-lead">Мы отправим ссылку для смены пароля, если аккаунт существует.</p>
        <form id="form" class="stack auth-form">
          <div>
            <label for="email">Email</label>
            <input id="email" type="email" required />
          </div>
          <button type="submit" class="btn">Отправить ссылку</button>
        </form>
        <p id="status" class="status"></p>
        <p class="muted"><a href="/login">Вернуться ко входу</a></p>
      </section>
    </main>
    <script type="module">
      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const status = document.getElementById("status");
        const res = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: document.getElementById("email").value }),
        });
        const data = await res.json().catch(() => ({}));
        status.textContent = data.message || data.error || "Если аккаунт существует, письмо отправлено.";
      });
    </script>
  </body>
</html>
