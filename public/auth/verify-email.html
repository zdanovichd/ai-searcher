<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Подтверждение email — AI Searcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/cabinet.css?v=4" />
  </head>
  <body class="app-page app-page--auth">
    <div class="noise" aria-hidden="true"></div>
    <main class="app-shell">
      <div class="app-brand">
        <p class="app-brand-title">AI Searcher</p>
        <p class="app-brand-subtitle">Подтверждение email</p>
      </div>
      <section class="app-card">
        <h2>Подтверждение email</h2>
        <p id="status" class="status">Подтверждаем адрес…</p>
        <p class="muted"><a href="/login">Перейти ко входу</a></p>
      </section>
    </main>
    <script type="module">
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token") || "";
      const status = document.getElementById("status");
      const res = await fetch("/api/auth/verify-email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token }),
      });
      const data = await res.json().catch(() => ({}));
      status.textContent = res.ok ? data.message || "Email подтверждён." : data.error || "Не удалось подтвердить email.";
      status.classList.toggle("error", !res.ok);
      status.classList.toggle("ok", res.ok);
    </script>
  </body>
</html>
