<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Пользователь — админка</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/cabinet.css?v=6" />
  </head>
  <body class="app-page">
    <div class="noise" aria-hidden="true"></div>
    <main class="app-shell">
      <header class="app-header">
        <div class="app-brand">
          <p class="app-brand-title"><a href="/admin/">Администрирование</a></p>
          <p class="app-brand-subtitle" id="user-headline">Пользователь</p>
        </div>
        <nav class="app-nav" aria-label="Основная навигация">
          <a href="/cabinet/">Кабинет</a>
          <a href="/cabinet/search">Поиск</a>
          <a href="/admin/" class="is-active">Администрирование</a>
          <button type="button" id="logout" class="btn-secondary">Выйти</button>
        </nav>
      </header>

      <p class="muted" style="margin: 0 0 1rem">
        <a href="/admin/">← К списку пользователей</a>
      </p>

      <section class="app-section app-grid app-grid-2">
        <article class="app-card">
          <h2>Профиль</h2>
          <p id="profile" class="muted">Загрузка…</p>
          <div class="btn-row" style="margin-top: 1rem">
            <button type="button" id="btn-promote" class="btn-secondary hidden">Назначить администратором</button>
            <button type="button" id="btn-demote" class="btn-secondary hidden">Сделать обычным пользователем</button>
            <button type="button" id="btn-block" class="btn-danger">Заблокировать</button>
          </div>
        </article>
        <article class="app-card">
          <h2>Баланс</h2>
          <p id="balance" class="metric-value">—</p>
          <div class="btn-row" style="margin-top: 0.75rem">
            <button type="button" id="btn-topup" class="btn-secondary">Пополнить +100</button>
          </div>
        </article>
      </section>

      <section class="app-section app-card">
        <h2>Лимиты</h2>
        <p class="app-lead muted">Пустое поле дня/месяца — без лимита. Размер пакета обязателен.</p>
        <form id="limits-form" class="stack" style="max-width: 480px">
          <div>
            <label for="lim-day">Запросов в день</label>
            <input id="lim-day" type="number" min="1" placeholder="без лимита" />
          </div>
          <div>
            <label for="lim-month">Запросов в месяц</label>
            <input id="lim-month" type="number" min="1" placeholder="без лимита" />
          </div>
          <div>
            <label for="lim-batch">Макс. размер пакета</label>
            <input id="lim-batch" type="number" min="1" max="120" required />
          </div>
          <button type="submit" class="btn">Сохранить лимиты</button>
        </form>
        <p id="limits-status" class="status"></p>
      </section>

      <section class="app-section app-card">
        <h2>API-ключи</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Название</th>
                <th>Префикс</th>
                <th>Создан</th>
                <th>Статус</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="api-keys"></tbody>
          </table>
        </div>
      </section>

      <section class="app-section app-card">
        <h2>История запросов</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th>Запрос</th>
                <th>Ответы</th>
                <th>Пакет</th>
                <th>Кол-во</th>
              </tr>
            </thead>
            <tbody id="history"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script type="module" src="/admin/user.js?v=8"></script>
  </body>
</html>
